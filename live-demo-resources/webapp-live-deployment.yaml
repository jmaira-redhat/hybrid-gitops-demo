apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-live
  namespace: demo-gitops
  labels:
    app: reactjs-frontend-live
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reactjs-frontend-live
  template:
    metadata:
      labels:
        app: reactjs-frontend-live
    spec:
      containers:
        - name: web-frontend-live
          image: registry.access.redhat.com/ubi9/python-39:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              pip install pg8000
              
              cat << 'PYEOF' > /tmp/live_server.py
              import http.server
              import socketserver
              import os
              import pg8000
              from urllib.parse import parse_qs

              def get_db_connection():
                  return pg8000.connect(
                      host=os.environ.get('POSTGRES_DB_HOST'),
                      port=int(os.environ.get('POSTGRES_DB_PORT', 5432)),
                      user=os.environ.get('POSTGRES_DB_USER'),
                      password=os.environ.get('POSTGRES_DB_PASSWORD'),
                      database='postgres'
                  )

              try:
                  conn = get_db_connection()
                  cursor = conn.cursor()
                  cursor.execute("CREATE TABLE IF NOT EXISTS inventory (id SERIAL PRIMARY KEY, item_name TEXT, quantity INT);")
                  conn.commit()
                  cursor.close()
                  conn.close()
                  print("Live Engine Table Initialized.")
              except Exception as e:
                  print("Live Engine Bootstrap Fail:", e)

              class LiveCRUDHandler(http.server.SimpleHTTPRequestHandler):
                  def do_GET(self):
                      if self.path == '/':
                          self.send_response(200)
                          self.send_header('Content-type', 'text/html')
                          self.end_headers()
                          
                          rows_html = ""
                          try:
                              conn = get_db_connection()
                              cursor = conn.cursor()
                              cursor.execute("SELECT item_name, quantity FROM inventory ORDER BY id DESC;")
                              for row in cursor.fetchall():
                                  rows_html += f"<tr><td style='padding:12px; border:1px solid #ddd;'>{row[0]}</td><td style='padding:12px; border:1px solid #ddd;'><b>{row[1]}</b></td></tr>"
                              cursor.close()
                              conn.close()
                          except Exception as e:
                              rows_html = f"<tr><td colspan='2'>Error: {e}</td></tr>"

                          html = f"""
                          <html>
                          <head>
                              <title>ArgoCD Live Sync Demo</title>
                              <style>
                                  body {{ font-family: sans-serif; margin: 40px; background-color: #f0fdf4; }}
                                  .card {{ background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }}
                                  h2 {{ color: #166534; }}
                                  .badge {{ background: #16a34a; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.8em; }}
                                  table {{ width: 100%; border-collapse: collapse; margin-top: 20px; }}
                                  th, td {{ text-align: left; padding: 8px; border-bottom: 1px solid #ddd; }}
                              </style>
                          </head>
                          <body>
                              <div class="card">
                                  <h2>⚡ Live ArgoCD GitOps Deployment <span class="badge">Success</span></h2>
                                  <p>This stack was just deployed completely declaratively via the pipeline engine.</p>
                                  <form method="POST" action="/add">
                                      <input type="text" name="item" placeholder="Live Item Name" required style="padding:8px;">
                                      <input type="number" name="qty" placeholder="Live Qty" required style="padding:8px;">
                                      <button type="submit" style="background:#16a34a; color:white; border:none; padding:8px 12px; cursor:pointer;">Push to Live VM</button>
                                  </form>
                                  <table>
                                      <tr><th>Asset</th><th>Qty</th></tr>
                                      {rows_html}
                                  </table>
                              </div>
                          </body>
                          </html>
                          """
                          self.wfile.write(html.encode())
                      else:
                          self.send_error(404)

                  def do_POST(self):
                      if self.path == '/add':
                          content_length = int(self.headers['Content-Length'])
                          post_data = self.rfile.read(content_length).decode('utf-8')
                          params = parse_qs(post_data)
                          try:
                              conn = get_db_connection()
                              cursor = conn.cursor()
                              cursor.execute("INSERT INTO inventory (item_name, quantity) VALUES (%s, %s);", (params['item'][0], int(params['qty'][0])))
                              conn.commit()
                              cursor.close()
                              conn.close()
                          except Exception as e:
                              print("Live insertion error:", e)

                          self.send_response(303)
                          self.send_header('Location', '/')
                          self.end_headers()

              print("Starting Live Demo Server on port 8080...")
              with socketserver.TCPServer(("", 8080), LiveCRUDHandler) as httpd:
                  httpd.serve_forever()
              PYEOF

              python3 /tmp/live_server.py
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_DB_HOST
              value: "postgres-service-live"
            - name: POSTGRES_DB_PORT
              value: "5432"
            - name: POSTGRES_DB_USER
              value: "postgres"
            - name: POSTGRES_DB_PASSWORD
              value: "LiveSecretPassword123"
---
apiVersion: v1
kind: Service
metadata:
  name: reactjs-service-live
  namespace: demo-gitops
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: reactjs-frontend-live
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: reactjs-route-live
  namespace: demo-gitops
spec:
  to:
    kind: Service
    name: reactjs-service-live
  port:
    targetPort: 8080
  tls:
    termination: edge