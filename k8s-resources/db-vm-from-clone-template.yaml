kind: Template
apiVersion: template.openshift.io/v1
metadata:
  name: postgres-db-vm-template
  namespace: demo-gitops
  labels:
    app.kubernetes.io/part-of: hyperconverged-cluster
    template.kubevirt.io/architecture: amd64
    template.kubevirt.io/version: v0.34.1
    app.kubernetes.io/version: 4.21.8
    template.kubevirt.io/type: vm  # Keeps it firmly inside the Virtualization Template Catalog
    vm.kubevirt.io/template: centos-stream9-server-medium
    app.kubernetes.io/component: templating
    app.kubernetes.io/managed-by: ssp-operator
    flavor.template.kubevirt.io/medium: 'true'
    app.kubernetes.io/name: custom-templates
    vm.kubevirt.io/template.namespace: demo-gitops
    workload.template.kubevirt.io/server: 'true'
    os.template.kubevirt.io/centos-stream9: 'true'
  annotations:
    template.kubevirt.io/provider: "Pure Storage / Portworx Lab"
    name.os.template.kubevirt.io/centos-stream9: CentOS Stream 9 (PostgreSQL Managed)
    template.kubevirt.io/provider-url: 'https://github.com/jmaira-redhat/hybrid-gitops-demo'
    openshift.io/display-name: "CentOS Stream 9 - PostgreSQL DB Server"
    openshift.io/provider-display-name: "Pure Storage / Portworx Lab"
    description: "Production-grade parameterized PostgreSQL 16 database server template. Leverages Portworx NVMe replication storage classes and utilizes public-key SSH mechanics for access control."
    iconClass: icon-centos
    # REMOVED the 'hidden' tag so it populates clearly on the main User Templates dashboard
    tags: 'kubevirt,virtualmachine,linux,centosstream,database,postgres'
    defaults.template.kubevirt.io/disk: rootdisk
    template.openshift.io/bindable: 'false'
    openshift.kubevirt.io/pronounceable-suffix-for-name-expression: 'true'
    template.kubevirt.io/editable: |
      /objects[0].spec.template.spec.domain.cpu.sockets
      /objects[0].spec.template.spec.domain.cpu.cores
      /objects[0].spec.template.spec.domain.cpu.threads
      /objects[0].spec.template.spec.domain.memory.guest
      /objects[0].spec.template.spec.domain.devices.disks
      /objects[0].spec.template.spec.volumes
      /objects[0].spec.template.spec.networks
objects:
  - apiVersion: kubevirt.io/v1
    kind: VirtualMachine
    metadata:
      annotations:
        vm.kubevirt.io/validations: |
          [
            {
              "name": "minimal-required-memory",
              "path": "jsonpath::.spec.domain.memory.guest",
              "rule": "integer",
              "message": "This VM requires more memory.",
              "min": 1610612736
            }
          ]
      labels:
        app: '${NAME}'
        kubevirt.io/dynamic-credentials-support: 'true'
        vm.kubevirt.io/template: postgres-db-vm-template
        vm.kubevirt.io/template.revision: '1'
        vm.kubevirt.io/template.namespace: demo-gitops
      name: '${NAME}'
    spec:
      dataVolumeTemplates:
        - apiVersion: cdi.kubevirt.io/v1beta1
          kind: DataVolume
          metadata:
            name: '${NAME}-disk'
          spec:
            sourceRef:
              kind: DataSource
              name: '${DATA_SOURCE_NAME}'
              namespace: '${DATA_SOURCE_NAMESPACE}'
            storage:
              # Explicitly routing through your 3-node bare-metal Portworx engine pool
              storageClassName: portworx-kvirt-rwo
              volumeMode: Block
              resources:
                requests:
                  storage: 30Gi
      runStrategy: RerunOnFailure # Automatically starts and tracks state recovery flags
      template:
        metadata:
          annotations:
            vm.kubevirt.io/flavor: medium
            vm.kubevirt.io/os: centos-stream9
            vm.kubevirt.io/workload: server
          labels:
            kubevirt.io/domain: '${NAME}'
            kubevirt.io/size: medium
            app: postgres-db
        spec:
          architecture: amd64
          domain:
            cpu:
              cores: 4   # Scales up cleanly for your m5.metal hosts
              sockets: 1
              threads: 1
            devices:
              disks:
                - disk:
                    bus: virtio
                  name: rootdisk
                - disk:
                    bus: virtio
                  name: cloudinitdisk
              interfaces:
                - masquerade: {}
                  model: virtio
                  name: default
              rng: {}
            memory:
              guest: 8Gi # Upgrades RAM allocation for seamless database performance
          networks:
            - name: default
              pod: {}
          terminationGracePeriodSeconds: 180
          volumes:
            - dataVolume:
                name: '${NAME}-disk'
              name: rootdisk
            - cloudInitNoCloud:
                userData: |-
                  #cloud-config
                  user: admin
                  ssh_authorized_keys:
                    - ${SSH_PUBLIC_KEY}
                  ssh_pwauth: True
                  # Automates system packaging, initializes DB engine, opens network binds, and creates the default admin user
                  runcmd:
                    - dnf install -y postgresql-server postgresql
                    - postgresql-setup --initdb
                    - echo "host all all 0.0.0.0/0 md5" >> /var/lib/pgsql/data/pg_hba.conf
                    - echo "listen_addresses='*'" >> /var/lib/pgsql/data/postgresql.conf
                    - systemctl enable --now postgresql
                    - sudo -u postgres psql -c "ALTER USER postgres WITH PASSWORD 'SecretPassword123';"
              name: cloudinitdisk
parameters:
  - name: NAME
    description: "The name of your custom PostgreSQL database virtual machine instance"
    value: "postgres-db-prod"
    required: true
  - name: DATA_SOURCE_NAME
    description: Name of the DataSource to clone
    value: centos-stream9
  - name: DATA_SOURCE_NAMESPACE
    description: Namespace of the DataSource
    value: openshift-virtualization-os-images
  - name: SSH_PUBLIC_KEY
    description: "Paste your MacBook's secure public key string here (~/.ssh/id_rsa.pub) to enable passwordless virtctl access control"
    required: true